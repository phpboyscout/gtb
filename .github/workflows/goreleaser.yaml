# .github/workflows/goreleaser.yml
name: goreleaser

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "gtb,homebrew"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install documentation tools
        run: pip install zensical

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEV_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEV_CERT_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - name: Run GoReleaser ${{ env.flags }}
        uses: goreleaser/goreleaser-action@v6
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose ${{ env.flags }}

      # Notarize macOS binaries (requires APPLE_NOTARY_ISSUER_ID, APPLE_NOTARY_KEY_ID,
      # and APPLE_NOTARY_KEY secrets — create an App Store Connect API key at
      # appstoreconnect.apple.com → Users and Access → Integrations → App Store Connect API)
      - name: Notarize macOS binaries
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY }}
        run: |
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > notary_key.p8
          for archive in dist/gtb_Darwin_*.tar.gz; do
            xcrun notarytool submit "$archive" \
              --key notary_key.p8 \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --wait
          done
          rm notary_key.p8

      # Upload PR artifacts if on a PR branch
      - name: Upload PR artifacts
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: pr-binaries-${{ github.event.number }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7

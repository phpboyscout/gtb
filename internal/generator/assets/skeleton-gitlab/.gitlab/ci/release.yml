goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - goreleaser release --clean
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  artifacts:
    paths:
      - dist/
    when: on_success
